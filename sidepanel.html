<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Branch Side-by-Side</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div id="repo-info" class="repo-info hidden">
        <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" class="octicon octicon-repo"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"></path></svg>
        <span id="repo-name-display"></span>
      </div>
      <div class="header-top">
        <div class="input-group">
          <label for="branch-input">Target Branch / Commit:</label>
          <div class="controls">
            <input type="text" id="branch-input" placeholder="e.g. develop, feature/xyz" list="branch-list" autofocus />
            <datalist id="branch-list"></datalist>
            <button id="load-btn">Load</button>
          </div>
        </div>
        <button id="settings-toggle-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙️</button>
      </div>
      
      <div id="settings-panel" class="settings-panel hidden">
        <label for="pat-input">GitHub Personal Access Token (Optional):</label>
        <div class="controls">
          <input type="password" id="pat-input" placeholder="ghp_..." />
          <button id="save-pat-btn">Save</button>
        </div>
        <div id="settings-status" class="status-message"></div>
      </div>
      <div id="status-message" class="status-message"></div>
    </div>
  </div>
  
  <div class="iframe-container">
    <iframe id="github-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" title="GitHub File View"></iframe>
    <div id="placeholder" class="placeholder">
      <p>Enter a branch name and click Load</p>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
